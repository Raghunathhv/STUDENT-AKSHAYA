<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login to STUDENT-AKSHAYA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
      width: 350px;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      transition: 0.3s;
      font-size: 16px;
    }

    .input-group input:focus {
      border-color: #185a9d;
      outline: none;
      box-shadow: 0 0 5px rgba(24, 90, 157, 0.3);
    }

    .login-btn {
      display: inline-block;
      width: 100%;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      background-color: #185a9d;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      transition: background 0.3s;
      cursor: pointer;
      border: none;
    }

    .login-btn:hover {
      background-color: #1275c6;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #555;
      font-size: 14px;
    }

    @media (max-width: 400px) {
      .login-box {
        width: 90%;
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Register With STUDENT-AKSHAYA</h2>

    <form id="loginForm">
      <div class="input-group">
        <input type="text" id="username" placeholder="Username" required>
      </div>
      <div class="input-group">
        <input type="date" id="date" required>
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const date = document.getElementById('date').value;

      if (username === '') {
        alert("Please enter your username.");
        return;
      }

      if (date === '') {
        alert("Please select a date.");
        return;
      }

      // All good, redirect
      window.location.href = "page1.html";
    });
  </script>

</body>
</html>
